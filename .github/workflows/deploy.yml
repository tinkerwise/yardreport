name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Commit dist if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "Build dist"
          git push

      - name: Trigger cPanel deploy
        run: |
          curl -s -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_API_TOKEN }}" \
            "https://briancsmith.org:2083/execute/VersionControl/update?repository_root=/home/briancsm/repositories/yardreport&branch=main"
